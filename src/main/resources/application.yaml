spring:
  application:
    name: api-gateway
  security:
    user:
      name: disabled
      password: disabled
  config:
    import: optional:file:.env[.properties]

server:
  port: 8080

logging:
  level:
    org.springframework.cloud.gateway: TRACE

jwt:
  secret: ${JWT_SECRET}

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8761/eureka/

management:
  endpoints:
    web:
      exposure:
        include: "*"